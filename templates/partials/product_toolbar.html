<!-- Shared sort/filter toolbar + active filter chips for list & grid pages -->
<div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">

    <h5 class="fw-bold mb-0">
        Products
        <span class="text-secondary fs-6">({{ products|length }} found)</span>
    </h5>

    <div class="d-flex gap-2 align-items-center">

        <form method="get" class="d-flex align-items-center gap-1">
            {% if query %}<input type="hidden" name="q" value="{{ query }}">{% endif %}
            {% if selected_category %}<input type="hidden" name="category" value="{{ selected_category }}">{% endif %}
            <select name="sort" class="form-select form-select-sm" onchange="this.form.submit()">
                <option value="" {% if not selected_sort %}selected{% endif %}>Sort: Newest</option>
                <option value="price_asc" {% if selected_sort == 'price_asc' %}selected{% endif %}>Price: Low to High</option>
                <option value="price_desc" {% if selected_sort == 'price_desc' %}selected{% endif %}>Price: High to Low</option>
                <option value="rating" {% if selected_sort == 'rating' %}selected{% endif %}>Top Rated</option>
            </select>
        </form>

        <div class="btn-group shadow-sm" role="group">
            <a href="{% url 'product_grid' %}?{{ request.GET.urlencode }}"
               class="btn btn-outline-primary {% if request.resolver_match.url_name == 'product_grid' %}active{% endif %}">
                <i class="bi bi-grid-3x3-gap-fill me-1"></i>
                <span class="d-none d-sm-inline">Grid</span>
            </a>

            <a href="{% url 'product_list' %}?{{ request.GET.urlencode }}"
               class="btn btn-outline-primary {% if request.resolver_match.url_name == 'product_list' %}active{% endif %}">
                <i class="bi bi-list-ul me-1"></i>
                <span class="d-none d-sm-inline">List</span>
            </a>
        </div>

    </div>

</div>

{% if query or selected_category %}
<div class="d-flex gap-2 mb-3 flex-wrap">
    {% if query %}
    <span class="badge bg-light text-dark border d-flex align-items-center gap-1 p-2">
        "{{ query }}"
        <a href="?{% if selected_category %}category={{ selected_category }}{% endif %}" class="text-dark text-decoration-none">&times;</a>
    </span>
    {% endif %}
    {% if selected_category %}
    <span class="badge bg-light text-dark border d-flex align-items-center gap-1 p-2">
        {{ selected_category|capfirst }}
        <a href="?{% if query %}q={{ query }}{% endif %}" class="text-dark text-decoration-none">&times;</a>
    </span>
    {% endif %}
</div>
{% endif %}
